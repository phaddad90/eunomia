  <!-- Simplified brain outline -->
  <path d="M12 8 Q8 8 8 12 Q6 14 8 16 Q7 19 10 20 Q10 24 14 24 L18 24 Q22 24 22 20 Q25 19 24 16 Q26 14 24 12 Q24 8 20 8 Q18 6 16 6 Q14 6 12 8Z"
        fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Central line -->
  <line x1="16" y1="8" x2="16" y2="22" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <!-- Circuit dots -->
  <circle cx="16" cy="12" r="1.5" fill="#6366f1"/>
  <circle cx="12" cy="16" r="1" fill="#6366f1" opacity="0.6"/>
  <circle cx="20" cy="16" r="1" fill="#6366f1" opacity="0.6"/>
  <circle cx="16" cy="20" r="1" fill="#6366f1" opacity="0.6"/>
</svg>
